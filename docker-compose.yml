services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fitness_coach
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
  worker:
    build: .
    command: python -u -m app.workers.proactive_worker
    environment:
      PYTHONUNBUFFERED: "1"
    env_file: .env
    depends_on:
      - db
      - redis
volumes:
  pgdata:
