services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fitness_coach
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8002:8000"
    env_file: .env
    stop_grace_period: 30s
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
  worker:
    build: .
    command: arq app.workers.proactive_worker.WorkerSettings
    environment:
      PYTHONUNBUFFERED: "1"
    env_file: .env
    stop_grace_period: 30s
    depends_on:
      - db
      - redis
volumes:
  pgdata:
  redisdata:
