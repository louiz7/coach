<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Kano — Building your plan…</title>
    <link rel="icon" type="image/png" href="/static/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    {% include "_analytics.html" %}
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; background: #000; color: #fff; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      body { min-height: 100svh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
      .stage { max-width: 22rem; width: 100%; text-align: center; }
      .brand { margin-bottom: 3rem; }
      .spinner {
        width: 72px;
        height: 72px;
        margin: 0 auto 2rem;
        border-radius: 50%;
        border: 4px solid rgba(80,219,255,0.15);
        border-top-color: #50dbff;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 1.45rem; font-weight: 700; margin: 0 0 0.5rem; }
      .sub { color: #888; font-size: 0.95rem; line-height: 1.5; margin: 0; }
      .steps {
        margin-top: 2.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        text-align: left;
      }
      .step {
        font-size: 0.9rem;
        color: #555;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .step.is-active { color: #50dbff; }
      .step.is-done { color: #aaa; }
      .step::before {
        content: "•";
        font-size: 1.4rem;
        line-height: 0.8;
      }
      .step.is-done::before { content: "✓"; color: #50dbff; }

      .fail h1 { color: #ff6b6b; }
      .fail .spinner { display: none; }
      .fail .retry-link {
        display: inline-block;
        margin-top: 1.5rem;
        background: #50dbff;
        color: #000;
        text-decoration: none;
        font-weight: 600;
        padding: 0.85rem 1.3rem;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main class="stage" id="stage">
      <div class="brand">
        <img src="/static/images/kano-wordmark-white.svg" alt="Kano" width="88" height="20" />
      </div>
      <div class="spinner" id="spinner"></div>
      <h1 id="title">Building your plan…</h1>
      <p class="sub" id="sub">Crunching your goals, training history, and recovery data. This takes about 20 seconds.</p>

      <div class="steps" id="steps">
        <div class="step is-done">Payment confirmed</div>
        <div class="step is-active" id="step-build">Generating your personalized plan</div>
        <div class="step" id="step-redirect">Redirecting to your plan</div>
      </div>
    </main>

    <script>
      (function () {
        const TOKEN = "{{ token }}";
        const POLL_MS = 1500;
        const TIMEOUT_MS = 120000;
        const start = Date.now();

        async function poll() {
          if (!TOKEN) return showFail("Missing token. Please ask Kano for a fresh link.");
          if (Date.now() - start > TIMEOUT_MS) {
            return showFail("Your plan is taking longer than expected. Check your iMessage chat with Kano.");
          }
          try {
            const res = await fetch('/api/v1/onboarding/plan-status?token=' + encodeURIComponent(TOKEN));
            if (!res.ok) {
              setTimeout(poll, POLL_MS);
              return;
            }
            const data = await res.json();
            if (data.status === 'ready') {
              const stepBuild = document.getElementById('step-build');
              const stepRedirect = document.getElementById('step-redirect');
              if (stepBuild) { stepBuild.classList.remove('is-active'); stepBuild.classList.add('is-done'); }
              if (stepRedirect) { stepRedirect.classList.add('is-active'); }
              setTimeout(() => {
                window.location.href = '/plan?token=' + encodeURIComponent(TOKEN);
              }, 600);
              return;
            }
            if (data.status === 'failed') {
              return showFail("We hit a snag building your plan. Open iMessage and Kano will sort it.");
            }
            setTimeout(poll, POLL_MS);
          } catch (e) {
            setTimeout(poll, POLL_MS);
          }
        }

        function showFail(msg) {
          const stage = document.getElementById('stage');
          stage.classList.add('fail');
          document.getElementById('title').textContent = "Something went sideways";
          document.getElementById('sub').textContent = msg;
          const steps = document.getElementById('steps');
          if (steps) steps.style.display = 'none';
          const a = document.createElement('a');
          a.className = 'retry-link';
          a.href = '/unlock?token=' + encodeURIComponent(TOKEN);
          a.textContent = 'Try again';
          stage.appendChild(a);
        }

        poll();
      })();
    </script>
  </body>
</html>
