  document.addEventListener('click', function (ev) {
    // Text Kano CTA — sms: anchors
    var sms = ev.target.closest('a[href^="sms:"]');
    if (sms) {
      try {
        posthog.capture('text_kano_cta_clicked', {
          href: sms.getAttribute('href'),
          label: (sms.getAttribute('aria-label') || sms.innerText || '').trim().slice(0, 100),
          path: window.location.pathname,
        });
      } catch (e) {}
      return;
    }
    // Decoy plan CTA — the "Start free trial" / "Open my plan" button on /unlock
    var cta = ev.target.closest('a.cta');
    if (cta) {
      try {
        posthog.capture('decoy_plan_cta_clicked', {
          href: cta.getAttribute('href'),
          label: (cta.getAttribute('aria-label') || cta.innerText || '').trim().slice(0, 100),
          source_page: window.location.pathname,
        });
      } catch (e) {}
    }
  });
