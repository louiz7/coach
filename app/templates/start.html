<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hercules — Lock in.</title>
    <meta name="description" content="Starte deine Fitness-Reise mit Hercules." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      .start-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .start-wrap .headline {
        font-size: clamp(1.8rem, 5vw, 3rem);
        margin-bottom: 1rem;
      }
      .start-wrap .subtext {
        font-size: 1.1rem;
        opacity: 0.7;
        max-width: 480px;
        margin-bottom: 2.5rem;
      }
      .coming-soon-badge {
        display: inline-block;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        padding: 0.4rem 1.2rem;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 2rem;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <main class="start-wrap">
      <span class="coming-soon-badge">Onboarding</span>
      <h1 class="headline">
        Dein Profil wartet auf dich.<br />
        <span class="headline__accent">Bist du ready?</span>
      </h1>
      <p class="subtext">
        Das Formular kommt in Kürze. Wir melden uns per iMessage, sobald es live ist.
      </p>
    </main>
  </body>
</html>
