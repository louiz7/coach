name: Deploy
on:
  push:
    branches: [main]

# Only one deploy at a time. Newer pushes cancel older in-flight runs.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /root/coach
            # Clean up any stale git lock files left behind by a previously
            # cancelled deploy (otherwise `git fetch` fails with "cannot lock ref").
            find .git -name "*.lock" -type f -delete 2>/dev/null || true
            git fetch origin main
            git clean -fd          # remove untracked files/dirs (e.g. stale scripts)
            git reset --hard origin/main

            # Clean up any orphaned/half-recreated containers from a previous
            # cancelled deploy so `up -d --build` doesn't hit name conflicts.
            docker compose rm -fsv 2>/dev/null || true
            for c in coach-api-1 coach-worker-1 coach-db-1 coach-redis-1; do
              docker rm -f "$c" 2>/dev/null || true
            done

            docker compose up -d --build --remove-orphans
            sleep 8
            docker compose exec -T api alembic upgrade head
            docker compose ps