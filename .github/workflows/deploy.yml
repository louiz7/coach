name: Deploy
on:
  push:
    branches: [main]

# Only one deploy at a time. Newer pushes cancel older in-flight runs.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /root/coach
            git pull origin main
            docker compose up -d --build
            sleep 5
            docker compose exec -T api alembic upgrade head
            docker compose exec -T api python -m scripts.ingest_papers